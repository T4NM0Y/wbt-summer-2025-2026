<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form-two</title>
</head>

<body>
    <form class="card">
        <div class="card-header">
            <h2>Registration</h2>
            <h4>Please fill out the form below.</h4>
        </div>

        <div class="card-field">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name">
        </div>

        <div class="card-field">
            <label for="postal-code">Postal Code</label>
            <input type="number" id="postal-code" placeholder="Enter your postal code">
        </div>

        <div class="card-field">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" value="2024-06-01">
        </div>

        <div class="card-field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="card-field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="********">
        </div>

        <div class="card-radio">
            <label for="Country">Country</label>
            <select id="Country">
                <option value="Select a country...">Select a country...</option>
                <option value="usa">USA</option>
                <option value="canada">Canada</option>
                <option value="mexico">Mexico</option>

            </select>
        </div>

        <div class="button">
            <button type="submit" class="b1">Submit</button>
            <button type="reset" class="b2">Reset</button>
        </div>

    </form>



</body>

</html>
