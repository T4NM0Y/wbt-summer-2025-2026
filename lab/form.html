<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Information Form</title>
</head>

<body>

    <h1>Donor Information</h1>

    <form action="#">

        <table>

            <tr>
                <td><label for="fname">First Name*</label></td>
                <td><input type="text" id="fname" name="fname" required></td>
            </tr>

            <tr>
                <td><label for="lname">Last Name*</label></td>
                <td><input type="text" id="lname" name="lname" required></td>
            </tr>

            <tr>
                <td><label for="company">Company</label></td>
                <td><input type="text" id="company" name="company"></td>
            </tr>

            <tr>
                <td><label for="add1">Address 1*</label></td>
                <td><input type="text" id="add1" name="add1" required></td>
            </tr>

            <tr>
                <td><label for="add2">Address 2</label></td>
                <td><input type="text" id="add2" name="add2"></td>
            </tr>

            <tr>
                <td><label for="city">City*</label></td>
                <td><input type="text" id="city" name="city" required></td>
            </tr>

            <tr>
                <td><label for="state">State*</label></td>
                <td>
                    <select id="state" name="state" required>
                        <option value="">Select a State</option>
                        <option>California</option>
                        <option>New York</option>
                        <option>Texas</option>
                        <option>Florida</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><label for="zip">Zip Code*</label></td>
                <td>
                    <input type="text" id="zip" name="zip"
                        pattern="[A-Za-z0-9 ]+" required>
                </td>
            </tr>

            <tr>
                <td><label for="country">Country*</label></td>
                <td>
                    <select id="country" name="country" required>
                        <option value="">Select a Country</option>
                        <option>United States</option>
                        <option>Canada</option>
                        <option>Bangladesh</option>
                        <option>United Kingdom</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><label for="phone">Phone</label></td>
                <td><input type="tel" id="phone" name="phone"></td>
            </tr>

            <tr>
                <td><label for="fax">Fax</label></td>
                <td><input type="tel" id="fax" name="fax"></td>
            </tr>

            <tr>
                <td><label for="email">Email*</label></td>
                <td><input type="email" id="email" name="email" required></td>
            </tr>

            <tr>
                <td>
                    <label>Donation Amount*</label><br>
                    (Check a button or type in your amount)
                </td>

                <td>
                    <input type="radio" name="donation" value="None"> None

                    <input type="radio" name="donation" value="50"> $50

                    <input type="radio" name="donation" value="75"> $75

                    <input type="radio" name="donation" value="100"> $100

                    <input type="radio" name="donation" value="250"> $250

                    <input type="radio" name="donation" value="Other"> Other
                </td>
            </tr>
             


            <tr>
                <td> </td>
                <td><label for="otheramount">Other Amount $</label>
                
                    <input type="number" id="otheramount" name="otheramount" >
                </td>
            
            </tr>

            <tr>
                <td>
                    <label>Recurring Donation</label><br>
                    (Check if yes)
                </td>

                <td>
                    <input type="checkbox" id="recurring" name="recurring">

                    <label for="recurring">
                        I am interested in giving on a regular basis.
                    </label>
                </td>
            </tr>

            <tr>
                <td></td>

                <td>
                    Monthly Credit Card $

                    <input type="number" name="monthlyamount">

                    For

                    <input type="number" name="months">

                    Months
                </td>
            </tr>

            <tr>
                <td></td>

                <td>
                    <input type="submit" value="Continue">

                    <input type="reset" value="Reset">
                </td>
            </tr>

        </table>

    </form>

</body>

</html>
