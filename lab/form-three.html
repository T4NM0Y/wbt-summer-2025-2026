<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form-three</title>
</head>

<body>

    
    <form class="card">
        <div class="card-header">
            <h1>Create your account</h1>
            <h4>Join us in a couple of steps.</h4>
        </div>

        <div class="card-field">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name">
        </div>

        <div class="card-field">
            <label for="age">Age</label>
            <input type="number" id="age" placeholder="28" value="28">
        </div>

        <div class="card-field">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" value="2024-06-01">
        </div>

        <div class="card-field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="jane@example.com">
        </div>

        <div class="card-field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="********">
        </div>

        <div class="card-field">
            <label for="Preferred contact">Preferred Contact Method</label>

            <input type="radio" id="Preferred contact" name="contact" value="email">Email</input>
            <input type="radio" id="Preferred contact" name="contact" value="phone">Phone</input>
            <input type="radio" id="Preferred contact" name="contact" value="SMS">SMS</input>

        </div>

        <div class="button">
            <button type="submit" class="b1">Submit</button>
            <button type="reset" class="b2">Reset</button>
        </div>

    </form>


</body>

</html>
